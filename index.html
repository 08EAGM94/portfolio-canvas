<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <!--initial-scale=1 con maximum-scale=1 lo que va a pasar es que desactivemos el zoom a nuestra pagina-->
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <link rel="stylesheet" type="text/css" href="assets/fonts/fontawesome-free-6.1.2-web/css/all.min.css"/>
    <link rel="stylesheet" type="text/css" href="assets/fonts/poppins/poppins.css"/>
    <link rel="stylesheet" type="text/css" href="assets/css/reset.css"/>
    <link rel="stylesheet" type="text/css" href="assets/css/scroll.css"/>
    <link rel="stylesheet" type="text/css" href="assets/css/styles.css"/>
    <link rel="stylesheet" type="text/css" href="assets/css/responsive.css"/>
    <script src="assets/js/menu.js" defer></script>
    <title>Portafolio - Edgar Gutierrez</title>
</head>
<body>
    <!-------Layout principal------>
    <div class="layout">
        
        <!--Barra lateral (info usuario)-->
        <aside class="layout__aside">
            <section class="aside__userInfo">

                <!--Informacion general-->
                <div class="userInfo__general">
                    <div class="userInfo__containerImage">
                        <img src="assets/img/default-user.jpg" class="userInfo__image" alt="Foto del perfil del usuario"/>
                        <!--Aqui es la sombra con el pseudoelemento-->
                    </div>

                    <h2 class="userInfo__name">Edgar Gutierrez</h2>
                    <h4 class="userInfo__job">Desarrollador Web</h4>
                </div>
                
                <!--Menú de navegación-->
                <nav class="layout__menu">
                    <ul class="menu__list">
                        <li class="menu__option">
                            <a href="index.html" class="menu__link menu__link--active">
                                <i class="menu__icon fa-solid fa-house"></i>
                                <span class="menu__overlay">Home</span>
                            </a>
                        </li>

                        <li class="menu__option">
                            <a href="sobreMi.html" class="menu__link">
                                <i class="menu__icon fa-solid fa-user"></i>
                                <span class="menu__overlay">Sobre mi</span>
                            </a>
                        </li>

                        <li class="menu__option">
                            <a href="estudios.html" class="menu__link">
                                <i class="menu__icon fa-solid fa-graduation-cap"></i>
                                <span class="menu__overlay">Curriculum</span>
                            </a>
                        </li>

                        <li class="menu__option">
                            <a href="portafolio.html" class="menu__link">
                                <i class="menu__icon fa-solid fa-briefcase"></i>
                                <span class="menu__overlay">Portafolio</span>
                            </a>
                        </li>

                        <li class="menu__option">
                            <a href="blog.html" class="menu__link">
                                <i class="menu__icon fa-solid fa-book"></i>
                                <span class="menu__overlay">Blog</span>
                            </a>
                        </li>

                        <li class="menu__option">
                            <a href="contacto.html" class="menu__link">
                                <i class="menu__icon fa-solid fa-envelope"></i>
                                <span class="menu__overlay">Contacto</span>
                            </a>
                        </li>
                    </ul>
                </nav>

                <!--Links a redes sociales-->
                <div class="userInfo__links">
                    <ul class="links__social">
                        <li class="social__option">
                            <a href="#" class="social__link">
                                <i class="social__icon fa-brands fa-youtube"></i>
                            </a>
                        </li>

                        <li class="social__option">
                            <a href="#" class="social__link">
                                <i class="social__icon fa-brands fa-linkedin"></i>
                            </a>
                        </li>

                        <li class="social__option">
                            <a href="#" class="social__link">
                                <i class="social__icon fa-brands fa-instagram"></i>
                            </a>
                        </li>
                    </ul>
                </div>

                <!--Botón del curriculum-->
                <div class="userInfo__buttons">
                    <a href="#" class="userInfo__btn">Descargar CV</a>
                </div>

                <!--Footer-->
                <footer class="userInfo__footer">
                    &copy; 2024 Edgar Gutierrez
                </footer>

            </section>
        </aside>
        <!--Menú responsive-->
        <div class="layout__menuToggle">
            <i class="menuToggle__icon fa-solid fa-bars"></i>
            <i class="menuToggle__icon fa-solid fa-xmark"></i>
        </div>

        <!--Contenedor principal-->
        <main class="layout__content">
            <section class="content__page">
                <h1 class="page__name">Edgar Gutierrez</h1>
                <h2 class="page__job">Desarrollador Web</h2>
            </section>
        </main>

    </div>
</body>
</html>
