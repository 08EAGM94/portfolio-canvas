<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <link rel="stylesheet" type="text/css" href="assets/fonts/fontawesome-free-6.1.2-web/css/all.min.css"/>
    <link rel="stylesheet" type="text/css" href="assets/fonts/poppins/poppins.css"/>
    <link rel="stylesheet" type="text/css" href="assets/css/reset.css"/>
    <link rel="stylesheet" type="text/css" href="assets/css/scroll.css"/>
    <link rel="stylesheet" type="text/css" href="assets/css/styles.css"/>
    <link rel="stylesheet" type="text/css" href="assets/css/loader.css"/>
    <link rel="stylesheet" type="text/css" href="assets/css/responsive.css"/>
    <!--defer activa el script cuando el html se haya cargado -->
    <script src="assets/js/map.js" defer></script>
    <script src="assets/js/menu.js" defer></script>

    <title>Portafolio - Edgar Gutierrez</title>
</head>
<body>
    <!-------Layout principal------>
    <div class="layout">
        
        <!--Barra lateral (info usuario)-->
        <aside class="layout__aside">
            <section class="aside__userInfo">

                <!--Informacion general-->
                <div class="userInfo__general">
                    <div class="userInfo__containerImage">
                        <img src="assets/img/default-user.jpg" class="userInfo__image" alt="Foto del perfil del usuario"/>
                        <!--Aqui es la sombra con el pseudoelemento-->
                    </div>

                    <h2 class="userInfo__name">Edgar Gutierrez</h2>
                    <h4 class="userInfo__job">Desarrollador Web</h4>
                </div>
                
                <!--Menú de navegación-->
                <nav class="layout__menu">
                    <ul class="menu__list">
                        <li class="menu__option">
                            <a href="index.html" class="menu__link">
                                <i class="menu__icon fa-solid fa-house"></i>
                                <span class="menu__overlay">Home</span>
                            </a>
                        </li>

                        <li class="menu__option">
                            <a href="sobreMi.html" class="menu__link">
                                <i class="menu__icon fa-solid fa-user"></i>
                                <span class="menu__overlay">Sobre mi</span>
                            </a>
                        </li>

                        <li class="menu__option">
                            <a href="estudios.html" class="menu__link">
                                <i class="menu__icon fa-solid fa-graduation-cap"></i>
                                <span class="menu__overlay">Curriculum</span>
                            </a>
                        </li>

                        <li class="menu__option">
                            <a href="portafolio.html" class="menu__link">
                                <i class="menu__icon fa-solid fa-briefcase"></i>
                                <span class="menu__overlay">Portafolio</span>
                            </a>
                        </li>

                        <li class="menu__option">
                            <a href="blog.html" class="menu__link">
                                <i class="menu__icon fa-solid fa-book"></i>
                                <span class="menu__overlay">Blog</span>
                            </a>
                        </li>

                        <li class="menu__option">
                            <a href="contacto.html" class="menu__link menu__link--active">
                                <i class="menu__icon fa-solid fa-envelope"></i>
                                <span class="menu__overlay">Contacto</span>
                            </a>
                        </li>
                    </ul>
                </nav>

                <!--Links a redes sociales-->
                <div class="userInfo__links">
                    <ul class="links__social">
                        <li class="social__option">
                            <a href="#" class="social__link">
                                <i class="social__icon fa-brands fa-youtube"></i>
                            </a>
                        </li>

                        <li class="social__option">
                            <a href="#" class="social__link">
                                <i class="social__icon fa-brands fa-linkedin"></i>
                            </a>
                        </li>

                        <li class="social__option">
                            <a href="#" class="social__link">
                                <i class="social__icon fa-brands fa-instagram"></i>
                            </a>
                        </li>
                    </ul>
                </div>

                <!--Botón del curriculum-->
                <div class="userInfo__buttons">
                    <a href="#" class="userInfo__btn">Descargar CV</a>
                </div>

                <!--Footer-->
                <footer class="userInfo__footer">
                    &copy; 2024 Edgar Gutierrez
                </footer>

            </section>
        </aside>

        <!--Menú responsive-->
        <div class="layout__menuToggle">
            <i class="menuToggle__icon fa-solid fa-bars"></i>
            <i class="menuToggle__icon fa-solid fa-xmark"></i>
        </div>

        <!--Contenedor principal-->
        <main class="layout__content">
            <section class="content__page content__contact">
                <!--Este contenido cambia en cada pagina del sitio web-->
                <header class="contact__header">
                    <h1 class="contact__title">Contacto</h1>
                </header>

                <div class="contact__container">
                    <section class="contact__info">

                        <div class="contact__data">
                            <i class="contact__icon fa-solid fa-location-dot"></i>
                            <h2 class="contact__subtitle">Guadalajara</h2>
                        </div>

                        <div class="contact__data">
                            <i class="contact__icon fa-solid fa-phone"></i>
                            <h2 class="contact__subtitle">666 777 888</h2>
                        </div>

                        <div class="contact__data">
                            <i class="contact__icon fa-solid fa-envelope"></i>
                            <h2 class="contact__subtitle">eagm@ea.com</h2>
                        </div>

                        <div class="contact__data">
                            <i class="contact__icon fa-solid fa-circle-check"></i>
                            <h2 class="contact__subtitle">Desarrollador Freelance</h2>
                        </div>

                    </section>

                    <section class="contact__formBox">

                        <div class="contact__map" id="loadIframeMap">
                            <div class="loader"></div>
                        </div>

                        <header class="contact__formHeader">
                            <h3 class="formHeader__subtitle">¿Cómo puedo <span class="subtitle__color">ayudarte?</span></h3>
                        </header>

                        <form class="contact__form">
                            <div class="form__container">

                                <section class="form__left">

                                    <div class="form__group">
                                        <input type="text" class="form__input" name="name" required placeholder="Nombre"/>
                                        <label for="name" class="form__label">Nombre</label>
                                    </div>

                                    <div class="form__group">
                                        <input type="email" class="form__input" name="email" required placeholder="Email"/>
                                        <label for="email" class="form__label">Email</label>
                                    </div>

                                    <div class="form__group">
                                        <input type="text" class="form__input" name="subject" required placeholder="Subject"/>
                                        <label for="subject" class="form__label">Asunto</label>
                                    </div>


                                </section>

                                <section class="form__right">

                                    <div class="form__group form__group--textarea">
                                        <textarea class="form__input form__input--textarea" name="message" required placeholder="Mensaje"></textarea>
                                        <label for="message" class="form__label">Mensaje</label>
                                    </div>

                                </section>

                            </div>

                            <input type="submit" class="form__button" value="Enviar mensaje"/>

                        </form>

                    </section>
                </div>

            </section>        

        </main>            
                    

    </div>
</body>
</html>
